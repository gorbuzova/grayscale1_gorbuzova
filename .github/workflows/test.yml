name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy clang-format cmake libopencv-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: clang-format check
        run: clang-format --dry-run --Werror $(find src tests -type f \( -name "*.c" -o -name "*.cpp" \)) || true

      - name: clang-tidy check
        run: clang-tidy src/grayscale.c tests/test.c -p build || true

      - name: Build and Test
        run: bash run_all_tests.sh
        timeout-minutes: 20
